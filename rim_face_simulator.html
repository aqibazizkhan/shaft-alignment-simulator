<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rim & Face Shaft Alignment Simulator</title>

<style>
body { font-family: Arial; margin: 20px; background:#f4f6f8;}
h2 { color:#1b3c59; }

.container { display:flex; gap:30px; }

.panel {
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 8px rgba(0,0,0,0.1);
    width:300px;
}

input {
    width:80px;
    margin:3px;
}

button {
    margin-top:10px;
    padding:8px 12px;
    background:#1b3c59;
    color:white;
    border:none;
    border-radius:5px;
}

canvas {
    margin-top:20px;
    border:1px solid #ccc;
    background:white;
}
</style>
</head>

<body>

<h2>Rim & Face Shaft Alignment Simulator</h2>

<div class="container">

<!-- INPUT PANEL -->
<div class="panel">
<h3>Rim Readings (mm)</h3>
Top <input id="rt" type="number" step="0.01"><br>
Bottom <input id="rb" type="number" step="0.01"><br>
Left <input id="rl" type="number" step="0.01"><br>
Right <input id="rr" type="number" step="0.01"><br>

<h3>Face Readings (mm)</h3>
Top <input id="ft" type="number" step="0.01"><br>
Bottom <input id="fb" type="number" step="0.01"><br>
Left <input id="fl" type="number" step="0.01"><br>
Right <input id="fr" type="number" step="0.01"><br>

<h3>Machine Geometry (mm)</h3>
Coupling Diameter <input id="dia" type="number"><br>
Probe Distance (A) <input id="A" type="number"><br>
Front Foot (B) <input id="B" type="number"><br>
Rear Foot (C) <input id="C" type="number"><br>

<button onclick="calculate()">Calculate</button>
<button onclick="randomCase()">Training Case</button>
</div>

<!-- RESULTS -->
<div class="panel">
<h3>Results</h3>

<p id="voffset"></p>
<p id="vangle"></p>

<p id="hoffset"></p>
<p id="hangle"></p>

<h4>Corrections</h4>
<p id="frontShim"></p>
<p id="rearShim"></p>

<h4>Status</h4>
<p id="status"></p>
</div>

</div>

<canvas id="canvas" width="700" height="300"></canvas>

<script>

function val(id){ return parseFloat(document.getElementById(id).value)||0; }

function calculate(){

    // RIM
    let RT=val("rt"), RB=val("rb"), RL=val("rl"), RR=val("rr");

    // FACE
    let FT=val("ft"), FB=val("fb"), FL=val("fl"), FR=val("fr");

    // Geometry
    let dia=val("dia");
    let A=val("A");
    let B=val("B");
    let C=val("C");

    // Vertical plane
    let rimV = (RT - RB)/2;
    let faceV = (FT - FB)/dia;

    let offsetV = rimV;
    let angleV = faceV;

    // Horizontal plane
    let rimH = (RL - RR)/2;
    let faceH = (FL - FR)/dia;

    let offsetH = rimH;
    let angleH = faceH;

    // Shim calculations (vertical only)
    let shimFront = offsetV + angleV * B;
    let shimRear  = offsetV + angleV * C;

    // Output
    document.getElementById("voffset").innerText = "Vertical Offset: " + offsetV.toFixed(3);
    document.getElementById("vangle").innerText  = "Vertical Angularity: " + angleV.toFixed(5);

    document.getElementById("hoffset").innerText = "Horizontal Offset: " + offsetH.toFixed(3);
    document.getElementById("hangle").innerText  = "Horizontal Angularity: " + angleH.toFixed(5);

    document.getElementById("frontShim").innerText = "Front Foot Correction: " + shimFront.toFixed(3) + " mm";
    document.getElementById("rearShim").innerText  = "Rear Foot Correction: " + shimRear.toFixed(3) + " mm";

    // Tolerance check
    let tol = 0.05;
    if(Math.abs(offsetV)<tol && Math.abs(angleV)<0.0005)
        document.getElementById("status").innerText = "Aligned";
    else
        document.getElementById("status").innerText = "Misaligned";

    draw(offsetV, angleV);
}

function draw(offset, angle){

    let c=document.getElementById("canvas");
    let ctx=c.getContext("2d");
    ctx.clearRect(0,0,700,300);

    // Fixed machine
    ctx.beginPath();
    ctx.moveTo(50,150);
    ctx.lineTo(300,150);
    ctx.strokeStyle="black";
    ctx.stroke();

    // Misaligned machine
    ctx.beginPath();
    ctx.moveTo(300,150+offset*40);
    ctx.lineTo(600,150+offset*40+angle*2000);
    ctx.strokeStyle="red";
    ctx.stroke();
}

function randomCase(){
    document.getElementById("rt").value=(Math.random()-0.5).toFixed(3);
    document.getElementById("rb").value=(Math.random()-0.5).toFixed(3);
    document.getElementById("rl").value=(Math.random()-0.5).toFixed(3);
    document.getElementById("rr").value=(Math.random()-0.5).toFixed(3);

    document.getElementById("ft").value=(Math.random()-0.5).toFixed(3);
    document.getElementById("fb").value=(Math.random()-0.5).toFixed(3);
    document.getElementById("fl").value=(Math.random()-0.5).toFixed(3);
    document.getElementById("fr").value=(Math.random()-0.5).toFixed(3);

    document.getElementById("dia").value=200;
    document.getElementById("A").value=150;
    document.getElementById("B").value=300;
    document.getElementById("C").value=600;
}

</script>

</body>
</html>
